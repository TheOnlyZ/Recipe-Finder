<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Recommender</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }
header { background: #2d6a4f; color: white; padding: 1rem 2rem; }
header h1 { font-size: 1.5rem; }
main { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
.search-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 1.5rem; }
.search-card label { display: block; font-weight: 600; margin-bottom: .5rem; }
.search-row { display: flex; gap: .5rem; flex-wrap: wrap; }
.search-row input { flex: 1; min-width: 200px; padding: .7rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
.search-row button { padding: .7rem 1.5rem; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
.search-row button:disabled { opacity: .5; }
.tag-group { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .5rem; }
.tag { display: inline-flex; align-items: center; gap: .3rem; padding: .3rem .7rem; background: #e8f5e9; border-radius: 20px; font-size: .85rem; cursor: pointer; }
.tag .del { cursor: pointer; font-weight: bold; color: #999; }
.tag .del:hover { color: #c33; }
.stats { color: #666; font-size: .85rem; margin-bottom: 1rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
.card { background: white; border-radius: 12px; padding: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); cursor: pointer; transition: box-shadow .15s; }
.card:hover { box-shadow: 0 3px 8px rgba(0,0,0,.15); }
.card h3 { font-size: 1rem; margin-bottom: .5rem; color: #2d6a4f; }
.card .meta { font-size: .8rem; color: #888; margin-bottom: .4rem; }
.card .match-badge { display: inline-block; padding: .15rem .5rem; background: #d4edda; border-radius: 10px; font-size: .75rem; }
.card .preview { font-size: .85rem; color: #555; margin-top: .4rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.recipe-detail { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.recipe-detail h2 { color: #2d6a4f; margin-bottom: .3rem; }
.recipe-detail .source { color: #888; font-size: .85rem; margin-bottom: 1rem; }
.recipe-detail h4 { margin: 1rem 0 .5rem; color: #555; }
.recipe-detail .ing-list { list-style: none; }
.recipe-detail .ing-list li { padding: .3rem 0; border-bottom: 1px solid #eee; font-size: .9rem; }
.recipe-detail .instr-text { white-space: pre-wrap; font-size: .9rem; line-height: 1.6; }
.btn-back { display: inline-block; margin-bottom: 1rem; padding: .5rem 1rem; color: #2d6a4f; text-decoration: none; cursor: pointer; border-radius: 6px; }
.btn-back:hover { background: #e8f5e9; }
.search-hint { font-size: .85rem; color: #999; margin-top: .4rem; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = '';

function SearchBox({ query, onAdd, onRemove, onSearch }) {
  const [input, setInput] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    const val = input.trim().toLowerCase();
    if (!val) return;
    if (!query.includes(val)) onAdd(val);
    setInput('');
  };

  const handleKey = (e) => {
    if (e.key === 'Enter') handleSubmit(e);
  };

  return (
    <div className="search-card">
      <label>What ingredients do you have?</label>
      <div className="search-row">
        <input
          placeholder="e.g. chicken, eggs, butter"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={handleKey}
        />
        <button onClick={handleSubmit} disabled={!input.trim()}>Add</button>
        <button onClick={onSearch} disabled={query.length === 0}>Search</button>
      </div>
      {query.length > 0 && (
        <div className="tag-group">
          {query.map((t) => (
            <span key={t} className="tag">
              {t} <span className="del" onClick={() => onRemove(t)}>&times;</span>
            </span>
          ))}
        </div>
      )}
      <div className="search-hint">Type an ingredient and press Enter or Add</div>
    </div>
  );
}

function RecipeCard({ recipe, match, total, ratio, onClick }) {
  const pct = ratio >= 1 ? 'All' : Math.round(ratio * 100) + '%';
  return (
    <div className="card" onClick={onClick}>
      <h3>{recipe.title}</h3>
      <div className="meta">
        <span className="match-badge">{pct} match</span>
        {match > 0 && <span> &middot; {match} ingredients</span>}
      </div>
      <div className="preview">{recipe.instructions.slice(0, 150)}</div>
    </div>
  );
}

function RecipeDetail({ recipe, onBack }) {
  return (
    <div>
      <div className="btn-back" onClick={onBack}>&larr; Back to results</div>
      <div className="recipe-detail">
        <h2>{recipe.title}</h2>
        {recipe.book_id && <div className="source">Source book #{recipe.book_id}</div>}
        {recipe.ingredients && recipe.ingredients.length > 0 && (
          <>
            <h4>Ingredients</h4>
            <ul className="ing-list">
              {recipe.ingredients.map((ing, i) => <li key={i}>{ing}</li>)}
            </ul>
          </>
        )}
        <h4>Instructions</h4>
        <div className="instr-text">{recipe.instructions}</div>
      </div>
    </div>
  );
}

function App() {
  const [query, setQuery] = useState([]);
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [searched, setSearched] = useState(false);

  const addIngredient = (ing) => setQuery((q) => [...q, ing]);
  const removeIngredient = (ing) => setQuery((q) => q.filter((t) => t !== ing));

  const doSearch = useCallback(async () => {
    if (query.length === 0) return;
    setLoading(true);
    setSelected(null);
    setSearched(true);
    try {
      const params = new URLSearchParams({ ingredients: query.join(',') });
      const resp = await fetch(`${API}/api/search?${params}`);
      const data = await resp.json();
      setResults(data);
    } catch (err) {
      console.error(err);
      setResults([]);
    } finally {
      setLoading(false);
    }
  }, [query]);

  const viewRecipe = async (id) => {
    setLoading(true);
    try {
      const resp = await fetch(`${API}/api/recipes/${id}`);
      const data = await resp.json();
      setSelected(data);
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <header>
        <h1>Recipe Recommender</h1>
      </header>
      <main>
        <SearchBox
          query={query}
          onAdd={addIngredient}
          onRemove={removeIngredient}
          onSearch={doSearch}
        />

        {loading && <p style={{ textAlign: 'center', color: '#888' }}>Searching...</p>}

        {selected ? (
          <RecipeDetail recipe={selected} onBack={() => setSelected(null)} />
        ) : results && results.length > 0 ? (
          <>
            <div className="stats">{results.length} recipes found</div>
            <div className="grid">
              {results.map((r) => (
                <RecipeCard
                  key={r.recipe.id}
                  recipe={r.recipe}
                  match={r.match_count}
                  total={r.total_ingredients}
                  ratio={r.match_ratio}
                  onClick={() => viewRecipe(r.recipe.id)}
                />
              ))}
            </div>
          </>
        ) : searched ? (
          <p style={{ textAlign: 'center', color: '#888' }}>No recipes found. Try different ingredients.</p>
        ) : null}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
